# =============================================================================
# Account Setup — Caller Workflow (aws-lz-accounts)
# =============================================================================
# This repo owns the DATA layer:
#   - Validates + resolves account request YAML files (local scripts)
#   - Generates terraform.tfvars via scripts/resolve_account.py
#   - Uploads tfvars as artifact
#   - Calls aws-lz-platform's reusable account-deploy workflow for Terraform
#
# On workflow_dispatch / EventBridge: single-account deploy
# On push to accounts/requests/*.yaml: batch-processes all changed files
# =============================================================================

name: Account Setup

on:
  workflow_dispatch:
    inputs:
      account_id:
        description: "AWS Account ID (12 digits)"
        required: true
        type: string
      account_name:
        description: "AWS Account Name (e.g. prod-app-001)"
        required: true
        type: string
      environment:
        description: "Environment (auto-detected if blank)"
        required: false
        type: choice
        default: ""
        options:
          - ""
          - production
          - staging
          - development
          - sandbox
      auto_approve:
        description: "Skip manual approval (for automated triggers)"
        required: false
        type: boolean
        default: false
  push:
    paths:
      - 'accounts/requests/*.yaml'
    branches:
      - main

concurrency:
  group: account-setup-${{ github.event.inputs.account_id || github.sha }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: write

env:
  AWS_REGION: us-east-1

jobs:
  # ── Single-account: validate + resolve (workflow_dispatch) ─────────────────
  resolve:
    name: "Resolve Account"
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      account_id: ${{ steps.resolve.outputs.account_id }}
      account_name: ${{ steps.resolve.outputs.account_name }}
      environment: ${{ steps.resolve.outputs.environment }}
      auto_approve: ${{ steps.resolve.outputs.auto_approve }}

    steps:
      - name: Checkout accounts repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Checkout platform repo (for stacks/ layout)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: tf-landingzone/aws-lz-platform
          path: platform
          token: ${{ github.token }}

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate and resolve account
        id: resolve
        env:
          INPUT_ACCOUNT_ID: ${{ github.event.inputs.account_id }}
          INPUT_ACCOUNT_NAME: ${{ github.event.inputs.account_name }}
          INPUT_ENVIRONMENT: ${{ github.event.inputs.environment }}
          INPUT_AUTO_APPROVE: ${{ github.event.inputs.auto_approve }}
        run: |
          ACCOUNT_ID="${INPUT_ACCOUNT_ID}"
          ACCOUNT_NAME="${INPUT_ACCOUNT_NAME}"

          if [[ ! "$ACCOUNT_ID" =~ ^[0-9]{12}$ ]]; then
            echo "::error::Invalid account_id: must be exactly 12 digits"
            exit 1
          fi
          if [[ ! "$ACCOUNT_NAME" =~ ^[a-z0-9][a-z0-9-]{1,48}[a-z0-9]$ ]]; then
            echo "::error::Invalid account_name: must be 3-50 lowercase alphanumeric with hyphens"
            exit 1
          fi

          ENV_ARG=""
          [[ -n "${INPUT_ENVIRONMENT}" ]] && ENV_ARG="--environment ${INPUT_ENVIRONMENT}"

          # Generate tfvars into platform/stacks/account-setup/ for the deploy job
          mkdir -p platform/stacks/account-setup
          python3 scripts/resolve_account.py "$ACCOUNT_ID" "$ACCOUNT_NAME" $ENV_ARG \
            --output platform/stacks/account-setup/terraform.tfvars

          echo "account_id=${ACCOUNT_ID}" >> "$GITHUB_OUTPUT"
          echo "account_name=${ACCOUNT_NAME}" >> "$GITHUB_OUTPUT"
          echo "environment=${INPUT_ENVIRONMENT:-auto}" >> "$GITHUB_OUTPUT"
          echo "auto_approve=${INPUT_AUTO_APPROVE:-false}" >> "$GITHUB_OUTPUT"

      - name: Upload tfvars artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: account-tfvars
          path: platform/stacks/account-setup/terraform.tfvars
          retention-days: 5

  # ── Single-account deploy: calls platform reusable (workflow_dispatch) ─────
  deploy:
    name: "Deploy ${{ needs.resolve.outputs.account_name }}"
    needs: resolve
    if: github.event_name == 'workflow_dispatch'
    uses: tf-landingzone/aws-lz-platform/.github/workflows/account-deploy-reusable.yml@main
    with:
      account_id: ${{ needs.resolve.outputs.account_id }}
      account_name: ${{ needs.resolve.outputs.account_name }}
      environment: ${{ needs.resolve.outputs.environment }}
      auto_approve: ${{ fromJson(needs.resolve.outputs.auto_approve) }}
    secrets: inherit

  # ── Batch provisioning for push trigger ────────────────────────────────────
  # Detects all changed request YAMLs, resolves each account, and runs the
  # platform fleet deployer (deploy_accounts.py) for known account IDs.
  # Pending accounts (no ID yet) are queued for Control Tower creation.
  # ───────────────────────────────────────────────────────────────────────────
  batch:
    name: "Batch Onboard (push)"
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout accounts repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Checkout platform repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: tf-landingzone/aws-lz-platform
          path: platform
          token: ${{ github.token }}

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: "~> 1.9"
          terraform_wrapper: false

      - name: Resolve and batch deploy changed request files
        run: |
          set -euo pipefail

          CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'accounts/requests/*.yaml' 2>/dev/null \
            || git diff-tree --no-commit-id --name-only -r HEAD -- 'accounts/requests/*.yaml' \
            || echo "")

          if [[ -z "$CHANGED" ]]; then
            echo "No account request files changed — nothing to do."
            exit 0
          fi

          echo "Changed request files:"
          echo "$CHANGED"

          ACCOUNT_IDS=()
          PENDING_NAMES=()

          while IFS= read -r REQ_FILE; do
            [[ -z "$REQ_FILE" ]] && continue

            ACCOUNT_NAME=$(python3 -c "
import yaml, sys
try:
    with open(sys.argv[1]) as f:
        d = yaml.safe_load(f) or {}
    print(d.get('account_name', ''))
except Exception:
    print('')
" "$REQ_FILE")

            if [[ -z "$ACCOUNT_NAME" ]]; then
              echo "::warning::No account_name in $REQ_FILE — skipping"
              continue
            fi

            if [[ ! "$ACCOUNT_NAME" =~ ^[a-z0-9][a-z0-9-]{1,48}[a-z0-9]$ ]]; then
              echo "::error::Invalid account_name '$ACCOUNT_NAME' in $REQ_FILE"
              exit 1
            fi

            ACCOUNT_ID=""
            for dir in accounts/*/; do
              META="${dir}account.json"
              if [[ -f "$META" ]]; then
                STORED=$(python3 -c "
import json, sys
try:
    print(json.load(open(sys.argv[1])).get('account_name',''))
except Exception:
    print('')
" "$META" 2>/dev/null || echo "")
                if [[ "$STORED" == "$ACCOUNT_NAME" ]]; then
                  ACCOUNT_ID=$(basename "$dir")
                  break
                fi
              fi
            done

            if [[ -n "$ACCOUNT_ID" ]]; then
              if [[ ! "$ACCOUNT_ID" =~ ^[0-9]{12}$ ]]; then
                echo "::error::Corrupt account metadata: invalid account_id '$ACCOUNT_ID' for $ACCOUNT_NAME"
                exit 1
              fi
              echo "  Resolved: $ACCOUNT_NAME → $ACCOUNT_ID"
              ACCOUNT_IDS+=("$ACCOUNT_ID")
            else
              echo "  Pending (no account_id): $ACCOUNT_NAME — queuing for Control Tower"
              python3 scripts/process_account_requests.py --request "$REQ_FILE"
              PENDING_NAMES+=("$ACCOUNT_NAME")
            fi
          done <<< "$CHANGED"

          if [[ ${#PENDING_NAMES[@]} -gt 0 ]]; then
            echo "::warning::${#PENDING_NAMES[@]} account(s) queued for Control Tower creation:"
            printf '  - %s\n' "${PENDING_NAMES[@]}"
            echo "After Control Tower assigns account IDs, re-trigger this workflow."
          fi

          if [[ ${#ACCOUNT_IDS[@]} -eq 0 ]]; then
            echo "No accounts with known IDs to provision — done."
            exit 0
          fi

          echo "Starting fleet deployer for ${#ACCOUNT_IDS[@]} account(s)..."
          # deploy_accounts.py lives in the checked-out platform repo
          python3 platform/scripts/deploy_accounts.py \
            --account-id "${ACCOUNT_IDS[@]}" \
            --max-parallel 10

      - name: Upload batch report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: batch-onboard-report
          path: |
            deploy-report.json
            logs/
          retention-days: 30

  # ── Notify on failure ──────────────────────────────────────────────────────
  notify-failure:
    name: "Notify Failure"
    needs: [resolve, deploy, batch]
    if: failure()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Send failure notification
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MESSAGE="Account Setup FAILED. See: ${RUN_URL}"

          if [[ -n "${{ secrets.SNS_NOTIFICATION_TOPIC_ARN }}" ]]; then
            aws sns publish \
              --topic-arn "${{ secrets.SNS_NOTIFICATION_TOPIC_ARN }}" \
              --subject "Account Setup Failed" \
              --message "${MESSAGE}" || true
          fi

          echo "## Account Setup Failed" >> $GITHUB_STEP_SUMMARY
          echo "| Run URL | [View Run](${RUN_URL}) |" >> $GITHUB_STEP_SUMMARY
